name: Build and Release VST3 / CLAP / AUv2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: kick_synth-win-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: kick_synth-macos-universal

    name: Package ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- MACOS UNIVERSAL LOGIC ---
      - name: Add extra targets for macOS universal
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      # --- WINDOWS: ensure MSVC cl.exe is on PATH before the build ---
      # Without this, Git Bash (the default shell) puts MinGW's gcc/g++ before
      # MSVC's cl.exe, so cxx-build compiles NeuralAmpModelerCore with MinGW.
      # The resulting DLL/exe then requires MinGW runtime DLLs
      # (libgcc_s_seh-1.dll, libstdc++-6.dll, libwinpthread-1.dll) that are
      # absent on stock Windows machines → instant silent crash on load.
      - name: Set up MSVC environment (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build and Bundle (macOS universal)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          # Build both architectures
          cargo build --release --target x86_64-apple-darwin --lib
          cargo build --release --target aarch64-apple-darwin --lib

          # Generate bundle structure (VST3 + CLAP) using xtask
          cargo xtask bundle kick_synth --profile release

          # Stitch VST3 binary into a universal binary with lipo
          lipo -create \
            -output target/bundled/kick_synth.vst3/Contents/MacOS/kick_synth \
            target/x86_64-apple-darwin/release/libkick_synth.dylib \
            target/aarch64-apple-darwin/release/libkick_synth.dylib
          
          # Stitch CLAP binary into a universal binary with lipo
          lipo -create \
            -output target/bundled/kick_synth.clap/Contents/MacOS/kick_synth \
            target/x86_64-apple-darwin/release/libkick_synth.dylib \
            target/aarch64-apple-darwin/release/libkick_synth.dylib

          # lipo creates a new file with no code signature; re-apply ad-hoc
          # signatures so macOS doesn't kill the plugin on load (required on
          # Apple Silicon even for self-signed / non-notarised plugins).
          codesign --force --deep -s - target/bundled/kick_synth.vst3
          codesign --force --deep -s - target/bundled/kick_synth.clap

      # Use pwsh + explicit CC/CXX=cl as a belt-and-suspenders guarantee that
      # the MSVC compiler is selected even if ilammy did not modify PATH fully.
      # crt-static embeds the MSVC CRT (VCRUNTIME140*.dll, MSVCP140.dll) directly
      # into the binary so it runs on any Windows machine without requiring the
      # VC++ redistributable to be installed.
      - name: Build and Bundle (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          CC: cl
          CXX: cl
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo xtask bundle kick_synth --profile release

      # Diagnostic: print the DLL import list so CI logs confirm no MinGW or
      # MSVC runtime DLLs leak into the artifact.
      - name: Verify binary dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          foreach ($bin in (Get-ChildItem "target\bundled" -Recurse -File | Where-Object { $_.Extension -in ".vst3",".exe" })) {
            Write-Host "=== $($bin.Name) ==="
            dumpbin.exe /DEPENDENTS $bin.FullName | Select-String "\.dll"
          }

      # Smoke test: run the standalone exe for up to 5 seconds and capture any
      # output. A non-zero exit code or crash output here means the artifact is
      # broken and the logs will show exactly why.
      - name: Smoke test standalone exe (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RUST_BACKTRACE: "full"
        run: |
          $exe = Get-ChildItem "target\bundled" -Recurse -File -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Host "No standalone exe found — skipping"; exit 0 }
          Write-Host "Testing: $($exe.FullName)"
          $psi = [System.Diagnostics.ProcessStartInfo]::new($exe.FullName)
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError  = $true
          $psi.UseShellExecute        = $false
          $proc = [System.Diagnostics.Process]::Start($psi)
          $exited = $proc.WaitForExit(5000)
          $stdout = $proc.StandardOutput.ReadToEnd()
          $stderr = $proc.StandardError.ReadToEnd()
          if (-not $exited) {
            $proc.Kill()
            Write-Host "EXIT: still running after 5s — binary appears healthy"
          } else {
            Write-Host "EXIT CODE: $($proc.ExitCode)"
            if ($stdout) { Write-Host "STDOUT:`n$stdout" }
            if ($stderr) { Write-Host "STDERR:`n$stderr" }
            if ($proc.ExitCode -ne 0) {
              Write-Host "Binary crashed or exited with error"
              exit 1
            }
          }

      # --- MACOS: Build Audio Unit v2 wrapper via clap-wrapper ---
      - name: Install CMake and Ninja (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake ninja

      - name: Clone clap-wrapper (macOS)
        if: matrix.os == 'macos-latest'
        run: git clone --depth 1 --branch v0.14.0 https://github.com/free-audio/clap-wrapper.git /tmp/clap-wrapper

      - name: Build Audio Unit wrapper (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -G Ninja -B /tmp/au-build cmake/auv2 \
            -DCLAP_WRAPPER_SOURCE_DIR=/tmp/clap-wrapper \
            -DCLAP_BINARY_LOCATION="$(pwd)/target/bundled/kick_synth.clap" \
            -DPLUGIN_VERSION="${GITHUB_REF_NAME#v}" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/au-build --config Release

      - name: Copy Audio Unit to bundled directory (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # The bundle name matches OUTPUT_NAME in cmake/auv2/CMakeLists.txt
          AU_PATH=$(find /tmp/au-build -name "Kick Synth.component" -maxdepth 4 | head -1)
          if [ -z "$AU_PATH" ]; then
            echo "ERROR: Could not find 'Kick Synth.component' in /tmp/au-build"
            exit 1
          fi
          echo "Found AU bundle at: $AU_PATH"
          cp -r "$AU_PATH" target/bundled/

          # CMake+Ninja does not ad-hoc sign the component; do it here so
          # macOS doesn't kill it on load (required even without notarisation).
          codesign --force --deep -s - "target/bundled/Kick Synth.component"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/bundled/

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts for Release
        run: |
          cd artifacts
          # Zip Windows bundle (VST3 + CLAP)
          zip -r ../kick_synth-v${{ steps.get_version.outputs.VERSION }}-win64.zip kick_synth-win-x64/*
          # Zip macOS bundle (VST3 + CLAP + AUv2 — preserve symlinks and permissions)
          zip -ry ../kick_synth-v${{ steps.get_version.outputs.VERSION }}-macos.zip kick_synth-macos-universal/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
          name: Release v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
